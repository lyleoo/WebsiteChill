<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styleLogin.css" />
    <title>Login</title>
    <style></style>
  </head>

  <body>
    <!-- Login BOX -->
    <div class="login-box">
      <div class="logo-title">
        <img src="assets/logos/logoChill.png" alt="Logo" class="logo" />
      </div>
      <!-- text -->
      <h2>Masuk</h2>
      <h3>Selamat datang kembali!</h3>
      <p>Username</p>

      <form>
        <input type="text" placeholder="Masukkan username" />
        <p>Kata Sandi</p>
        <div class="password-box">
          <img src="assets/logos/hiddenEye.png" class="eye" draggable="false" />
          <input
            type="password"
            id="password"
            placeholder="Masukkan kata sandi"
          />
        </div>

        <div class="options">
          <span
            >Belum punya akun?
            <a href="register.html" class="highlight">Daftar</a>
          </span>
          <a href="#" class="highlight">Lupa kata sandi?</a>
        </div>
      </form>
      <!-- Button -->
      <div class="button-container">
        <button class="login-btn">Masuk</button>
        <div class="divider">Atau</div>
        <button class="google-btn">
          <img
            src="assets/logos/logoGoogle.png"
            alt="Logo"
            class="logoGoogle"
          />
          Masuk dengan Google
        </button>
      </div>
    </div>
  </body>
</html>
