<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styleLogin.css" />
    <title>Login</title>
    <style></style>
  </head>

  <body>
    <!-- Login BOX -->
    <div class="login-box">
      <!-- Logo and Title -->
      <div class="logo-title">
        <img src="logoChill.png" alt="Logo" class="logo" />
        <h1>CHILL</h1>
      </div>
      <!-- text -->
      <h2>Masuk</h2>
      <h3>Selamat datang kembali!</h3>
      <p2>Username</p2>
      <!-- Username and Password Input -->
      <div>
        <input type="text" placeholder="Masukan username" />
        <p2>Kata Sandi</p2>
        <div class="password-box">
          <img src="hiddenEye.png" class="eye" draggable="false" />
          <input
            type="password"
            id="password"
            placeholder="Masukan kata sandi"
          />
        </div>
        <p>
          Belum punya akun?
          <a href="register.html" class="highlight">Daftar</a>
        </p>
      </div>
      <!-- Button -->
      <div>
        <button class="login-btn">Masuk</button>
        <p class="p3">Atau</p>
        <button class="google-btn">
          <img src="logoGoogle.png" alt="Logo" class="logoGoogle" />
          Masuk dengan Google
        </button>
      </div>
    </div>
  </body>
</html>
