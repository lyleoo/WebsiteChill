<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styleRegister.css" />
    <title>Register</title>
    <style></style>
  </head>

  <body>
    <!-- register BOX -->
    <div class="register-box">
      <div class="logo-title">
        <img src="assets/logos/logoChill.png" alt="Logo" class="logo" />
      </div>
      <!-- text -->
      <h2>Daftar</h2>
      <h3>Selamat datang!</h3>
      <p>Username</p>
      <!-- Username and Password Input -->
      <div>
        <input type="text" placeholder="Masukkan username" />
        <p>Kata Sandi</p>
        <div class="password-box">
          <img src="assets/logos/hiddenEye.png" class="eye" draggable="false" />
          <input
            type="password"
            id="password"
            placeholder="Masukkan kata sandi"
          />
        </div>
      </div>
      <div class="konfirmasi">
        <p>Konfirmasi Kata Sandi</p>
        <div class="password-box2">
          <img
            src="assets/logos/hiddenEye.png"
            class="eye2"
            draggable="false"
          />
          <input
            type="password"
            id="password"
            placeholder="Masukkan kata sandi"
          />
        </div>

        <div class="options">
        <span>
          Sudah punya akun?
          <a href="login.html" class="highlight">Masuk</a>
        </span>
      </div>

      <!-- Button -->
      <div>
        <button class="register-btn">Daftar</button>
        <div class="divider">Atau</div>
        <button class="google-btn">
          <img
            src="assets/logos/logoGoogle.png"
            alt="Logo"
            class="logoGoogle"
          />
          Daftar dengan Google
        </button>
      </div>
    </div>
  </body>
</html>
